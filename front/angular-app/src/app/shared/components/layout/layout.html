<div class="d-flex flex-column vh-100">
  <app-header></app-header>
  <div class="d-flex flex-grow-1 overflow-hidden position-relative">
    
    <!-- Backdrop for mobile -->
    <div class="sidebar-backdrop" 
         [class.show]="isSidebarOpen && isMobile" 
         (click)="closeSidebarOnMobile()"></div>

    <app-sidebar></app-sidebar>
    
    <!-- Main Content Area -->
    <div class="d-flex flex-column flex-grow-1 overflow-auto position-relative layout-main-content">
      
      <!-- Blue Top Banner -->
      <div class="bg-gov-blue w-100 position-absolute top-0 start-0 layout-blue-banner"></div>

      <div class="container-fluid p-4 position-relative flex-grow-1 layout-container">
        <ng-content></ng-content>
      </div>
      
      <app-footer class="mt-auto w-100"></app-footer>
    </div>
  </div>
</div>
