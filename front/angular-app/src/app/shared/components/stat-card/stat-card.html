<div class="card shadow-sm border-0 stat-card h-100">
  <div class="card-body d-flex align-items-center p-3">
    <div class="stat-icon-wrapper me-3" [style.color]="color">
      <i [class]="icon + ' fa-3x'"></i>
    </div>
    <div>
      <h3 class="mb-0 fw-bold">{{ number }}</h3>
      <small class="text-muted text-uppercase fw-bold" style="font-size: 0.65rem">{{ text }}</small>
    </div>
  </div>
</div>
