<app-title-page title="Empresas" subtitle="Empresas cadastradas">
  <button class="btn btn-outline-light" routerLink="/empresa/detalhes">
    <i class="fas fa-plus me-2"></i>Nova Empresa
  </button>
</app-title-page>

<div class="input-group mb-3">
  <span class="input-group-text">Buscar:</span>
  <input type="text" class="form-control" placeholder="Digite informações da empresa" [(ngModel)]="termoBusca" />
</div>

<table class="table table-striped table-bordered table-hover">
  <thead>
    <tr>
      <th>#</th>
      <th>Nome</th>
      <th>Responsável</th>
      <th>Contato</th>
      <th>Situação</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let empresa of empresasFiltradas">
      <td>{{ empresa.id }}</td>
      <td>{{ empresa.nome }}</td>
      <td>{{ empresa.responsavel }}</td>
      <td>{{ empresa.contato }}</td>
      <td>{{ empresa.situacao }}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-2" [routerLink]="['/empresa/detalhes', empresa.id]">
          <i class="fas fa-user-edit me-2"></i>Editar
        </button>
        <button class="btn btn-sm btn-outline-danger me-2">
          <i class="fas fa-user-times me-2"></i>Desativar
        </button>
      </td>
    </tr>
  </tbody>
</table>
